name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate scripts and config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts for syntax errors
        run: |
          set -e
          for f in scripts/*.sh; do
            echo "Checking: $f"
            bash -n "$f" && echo "  OK" || { echo "  FAILED"; exit 1; }
          done

      - name: Validate systemd units
        run: |
          set -e
          python3 scripts/validate-systemd.py

      - name: Validate openclaw JSON
        run: |
          set -e
          python3 scripts/validate-openclaw.py

  build-llama-cpp:
    name: Build llama.cpp for Strix Halo
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version variables
        run: |
          if [ -f llama_cpp_version ]; then
            source ./llama_cpp_version
            echo "LLAMA_CPP_VER=$LLAMA_CPP_VER" >> $GITHUB_ENV
          else
            echo "LLAMA_CPP_VER=latest" >> $GITHUB_ENV
          fi

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential ninja-build ccache libcurl4-openssl-dev

      - name: Install ROCm
        run: |
          curl -sL https://repo.radeon.com/rocm/rocm.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/7.2.1 noble main" \
              | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update -qq
          sudo apt-get install -y rocm-hip-sdk
          echo "/opt/rocm/bin" >> $GITHUB_PATH

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch ${LLAMA_CPP_VER:-latest} https://github.com/ggml-org/llama.cpp.git

      - name: Build
        run: |
          cd llama.cpp
          export ROCM_PATH=/opt/rocm
          export LLVM_BIN="$(hipconfig -l)"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${LLVM_BIN}/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_BIN}/clang++" \
            -DGGML_HIP=ON \
            -DGPU_TARGETS=gfx1151 \
            -DGGML_HIP_ROCWMMA_FATTN=ON \
            -DGGML_HIP_NO_VMM=ON \
            -DGGML_HIP_MMQ_MFMA=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON
          cmake --build build --config Release -j$(nproc)

      - name: Package
        run: |
          tar -cJf llama-cpp-strix-halo.tar.xz -C llama.cpp/build/bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-strix-halo
          path: llama-cpp-strix-halo.tar.xz
          retention-days: 5

  release:
    name: Create release
    needs: build-llama-cpp
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: llama-cpp-strix-halo
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}